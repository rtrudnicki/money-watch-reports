const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function tryOpen(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),
    "PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(SALT),iterations:ITERS,hash:"SHA-256"},km,
    {name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(NONCE)},key,b64(CT));
  return new TextDecoder().decode(pt);
}
async function go(){
  const pw=document.getElementById("pw").value.trim().toLowerCase();
  if(!pw)return;
  document.getElementById("err").textContent="";
  try{
    const html=await tryOpen(pw);
    localStorage.setItem("mw_pw",pw);
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById("err").textContent="Wrong password — try again.";}
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go()});
